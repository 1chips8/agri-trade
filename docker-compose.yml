services:
  mysql:
    image: public.ecr.aws/docker/library/mysql:8.0
    container_name: agri-trade-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: agri_trade
      MYSQL_USER: agri
      MYSQL_PASSWORD: agri123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uagri", "-pagri123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: agri-trade-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: public.ecr.aws/docker/library/rabbitmq:3.13-management
    container_name: agri-trade-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: agri
      RABBITMQ_DEFAULT_PASS: agri123456
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    container_name: agri-trade-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: agri_trade
      MYSQL_USER: agri
      MYSQL_PASSWORD: agri123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: agri
      RABBITMQ_PASSWORD: agri123456
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: agri-trade-frontend
    depends_on:
      - backend

  nginx:
    image: public.ecr.aws/docker/library/nginx:1.27-alpine
    container_name: agri-trade-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
